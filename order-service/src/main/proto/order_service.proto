syntax = "proto3";

package uz.coder.order;

option java_multiple_files = true;
option java_package = "uz.coder.order.grpc";
option java_outer_classname = "OrderServiceProto";

service OrderService {
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
  rpc GetOrdersByCustomer (GetOrdersByCustomerRequest) returns (OrderListResponse);
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc UpdateStatus (UpdateStatusRequest) returns (OrderResponse);
}

enum OrderStatus {
  PENDING = 0;
  CONFIRMED = 1;
  PROCESSING = 2;
  SHIPPED = 3;
  DELIVERED = 4;
  CANCELLED = 5;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrdersByCustomerRequest {
  string customer_id = 1;
}

message OrderItemRequest {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  string unit_price = 4;
}

message CreateOrderRequest {
  string customer_id = 1;
  repeated OrderItemRequest items = 2;
}

message UpdateStatusRequest {
  string id = 1;
  string status = 2;
}

message OrderItem {
  string id = 1;
  string product_id = 2;
  string product_name = 3;
  int32 quantity = 4;
  string unit_price = 5;
}

message OrderResponse {
  string id = 1;
  string customer_id = 2;
  OrderStatus status = 3;
  repeated OrderItem items = 4;
  string total_amount = 5;
  string created_at = 6;
  string updated_at = 7;
}

message OrderListResponse {
  repeated OrderResponse orders = 1;
}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices
  labels:
    app: order-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: order-service-sa
      containers:
        - name: order-service
          image: order-service
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8081
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: order-service
            - secretRef:
                name: order-service-secret
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/orders/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/orders/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
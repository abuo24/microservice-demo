server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/microservices}

  cloud:
    kubernetes:
      discovery:
        enabled: true
        all-namespaces: false
      config:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  swagger-ui:
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: order-service
        url: /api/orders/v3/api-docs
      - name: inventory-service
        url: /api/inventory/v3/api-docs

resilience4j:
  circuitbreaker:
    instances:
      order-composition:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        registerHealthIndicator: true

logging:
  level:
    uz.coder: DEBUG
    org.springframework.cloud.gateway: INFO
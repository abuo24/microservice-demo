apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, services, pods]
    verbs: [get, watch, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: microservices
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: microservices
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: microservices-pods
        static_configs:
          - targets: [localhost]
            labels:
              namespace: microservices
              __path__: /var/log/pods/microservices_*/*/*.log
        pipeline_stages:
          # Extract container name from log file path -> container label
          - match:
              selector: '{namespace="microservices"}'
              stages:
                - regex:
                    source: filename
                    expression: '/var/log/pods/[^/]+/(?P<container>[^/]+)/\d+\.log'
                - labels:
                    container:
          # Parse JSON from our services; non-JSON lines pass through unchanged
          - json:
              expressions:
                level: level
                trace_id: traceId
                span_id: spanId
                app: app
          - labels:
              app:
              level:
              trace_id:
              span_id:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: microservices
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          ports:
            - containerPort: 9080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
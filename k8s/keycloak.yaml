apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: microservices
type: Opaque
stringData:
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "adminPass"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: microservices
data:
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
---
# Realm JSON auto-imported on startup via --import-realm
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: microservices
data:
  microservices-realm.json: |
    {
      "realm": "microservices",
      "enabled": true,
      "accessTokenLifespan": 300,
      "ssoSessionMaxLifespan": 36000,
      "registrationAllowed": false,
      "clients": [
        {
          "clientId": "microservices-client",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "protocol": "openid-connect"
        }
      ],
      "roles": {
        "realm": [
          {"name": "USER", "composite": false},
          {"name": "ADMIN", "composite": false}
        ]
      },
      "users": [
        {
          "username": "user1",
          "enabled": true,
          "emailVerified": true,
          "email": "user1@example.com",
          "firstName": "User",
          "lastName": "One",
          "requiredActions": [],
          "credentials": [{"type": "password", "value": "password123", "temporary": false}],
          "realmRoles": ["USER"]
        },
        {
          "username": "admin1",
          "enabled": true,
          "emailVerified": true,
          "email": "admin1@example.com",
          "firstName": "Admin",
          "lastName": "One",
          "requiredActions": [],
          "credentials": [{"type": "password", "value": "admin123", "temporary": false}],
          "realmRoles": ["USER", "ADMIN"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: microservices
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          imagePullPolicy: IfNotPresent
          args: ["start-dev", "--import-realm"]
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: keycloak-config
            - secretRef:
                name: keycloak-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 768Mi
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: microservices
  labels:
    app: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
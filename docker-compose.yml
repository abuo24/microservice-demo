# Full stack — build images and run everything in Docker.
# Build first: see instructions below or run `docker compose build`

name: microservices-demo

services:

  # ────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dbPass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - microservices-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redisPass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redisPass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    networks:
      - microservices-net

  kafka:
    image: apache/kafka:4.0.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - microservices-net

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-net

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminPass
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: dbPass
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    ports:
      - "8090:8080"    # Admin UI: http://localhost:8090
    networks:
      - microservices-net

  # ────────────────────────────────────────
  # Application services
  # ────────────────────────────────────────

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    image: order-service:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orders
      DB_USERNAME: postgres
      DB_PASSWORD: dbPass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redisPass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_ISSUER_URI: http://keycloak:8080/realms/microservices
      JWT_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    restart: on-failure

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    image: inventory-service:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: inventory
      DB_USERNAME: postgres
      DB_PASSWORD: dbPass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redisPass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_ISSUER_URI: http://keycloak:8080/realms/microservices
      JWT_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redisPass
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_ISSUER_URI: http://keycloak:8080/realms/microservices
      JWT_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    depends_on:
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - microservices-net
    restart: on-failure

volumes:
  postgres-data:
  redis-data:
  kafka-data:

networks:
  microservices-net:
    driver: bridge
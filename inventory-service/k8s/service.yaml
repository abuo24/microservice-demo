apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: microservices
  labels:
    app: inventory-service
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
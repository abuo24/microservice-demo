apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: microservices
  labels:
    app: inventory-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      serviceAccountName: inventory-service-sa
      containers:
        - name: inventory-service
          image: inventory-service
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8082
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: inventory-service
            - secretRef:
                name: inventory-service-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/inventory/actuator/health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 13
          readinessProbe:
            httpGet:
              path: /api/inventory/actuator/health/readiness
              port: 8082
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/inventory/actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3